<!DOCTYPE html>
<html>
<title>contacto</title>

<head>

    <style>
        button:hover {
            transform: scale(1.05);

            transition: 0.4s;

            box-shadow: 0px 0px 10px rgba(236, 229, 229, 0.781);
             cursor: pointer;
        }

        button {
            display: block;

            margin: 30px auto;
            transition: 0.4s;
            will-change: transform;
            color: rgb(255, 255, 255);
            width: 300px;

            padding: 30px;

            border: 2px solid rgb(246, 255, 0);

            border-radius: 20px;

            background: rgba(0, 0, 0, 0.607);

            backdrop-filter: blur(10px);

            text-align: center;

            box-shadow: 0px 0px 10px rgb(0, 0, 0);
        }

        .contacto img {

            width: 150px;

            height: auto;
        }

        #caja-contacto {

            display: none;
        }

        body::before {

            content: "";

            position: fixed;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            background: rgba(0, 0, 0, 0.3);

            z-index: -1;

            pointer-events: none;
        }

        .contacto:hover {
             cursor: pointer;

            transform: scale(1.05);

            transition: 0.5s;


            border: 2px solid rgb(0, 0, 0);

            backdrop-filter: blur(10px);

        }

        h1 {

            background: rgba(0, 0, 0, 0.323);

            padding: 20px;

            border-radius: 30px;

            width: fit-content;

            margin: 3px auto;
        }

        h2 {
            text-align: center;
            font-size: 40px;
        }

        .contacto h2 {

            color: lime;
        }

        .contacto p {

            color: white;

            font-size: 25px;
        }

        .contacto {
            border: 2px solid rgb(255, 255, 255);
            width: 300px;

            margin: 100px auto;

            padding: 30px;

            border-radius: 30px;

            background: rgba(255, 255, 255, 0.607);

            backdrop-filter: blur(10px);

            text-align: center;

            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.833);

            animation: aparecer 2s;
        }

        img {
            font-size: 20px;
        }

        h3 {

            text-shadow: 0 0 10px rgba(238, 255, 0, 0.5), 0 0 20px rgba(0, 243, 255, 0.3);
            color: rgb(0, 221, 255);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            animation: aparecer 3s;
            font-size: 30px;
        }

        video {


            position: fixed;

            width: 100%;

            height: 100%;

            object-fit: cover;

            top: 0;

            left: 0;

            z-index: -2;
        }

        h1 {

            color: white;

            text-align: center;

            font-size: 30px;

            text-shadow:
                0px 0px 10px rgb(31, 31, 31),
                0px 0px 20px rgb(200, 255, 0),
                0px 0px 40px rgb(255, 255, 255);

            font-family: Arial;
            text-align: center;
            animation: aparecer 2s;
            color: gold;
        }

        @keyframes aparecer {

            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>


    <button onclick="sonar(); mostrarCaja();">
        📱 Contáctame
    </button>
    <h2>👇</h2>
    <div id="caja-contacto">

        <a href="https://wa.me/573150979873?text=Hola, estoy interesado">

            <div class="contacto">

                <img src="logo whatssapp.png">

            </div>

        </a>

    </div>


    <script>
        let caja = document.getElementById("caja-contacto");
        function mostrarCaja() {

            if (caja.style.display === "none" || caja.style.display === "") {
                caja.style.display = "block";
            } else {
                caja.style.display = "none";
            }
        }
    </script>


    <audio id="sonido" preload="auto">
    <source src="Click.mp3" type="audio/mpeg">
</audio>

<script>

function sonar(){
    let audio = document.getElementById("sonido").cloneNode(true);
    audio.play();

}
</script>
    <video autoplay muted loop>
        <source src="fondo minecraft.mp4">
    </video>

</body>
