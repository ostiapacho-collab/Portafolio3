<!DOCTYPE html>
<html>

<head>

    <title>Document</title>

    <style>
        p {
            color: white;
            font-size: 14px;
        }

        .card {
            transform-style: preserve-3d;
            transition: transform 0.2s ease;
        }

        .proyecto {

            width: 300px;

            padding: 25px;

            margin: 20px auto;

            text-align: center;

            color: white;

            background: rgba(0, 0, 0, 0.4);

            backdrop-filter: blur(10px);

            border: 2px solid cyan;

            border-radius: 20px;

            transition: 0.4s;

            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);

            animation: subir 2s;
        }

        .proyecto:hover {
            border-color: white;

            box-shadow:
                0 0 10px cyan,
                0 0 20px cyan,
                0 0 40px cyan;
        }


        .proyecto p {

            font-size: 14px;

            color: rgb(220, 220, 220);
        }



        a {
            text-decoration: none;
            color: white;
            display: inline-block;
            margin: 20px;
        }

        #caja-contacto {
            display: none;
        }

        #caja1-contacto1 {
            display: none;
        }

        h2:hover {
            transform: translateY(-8px) scale(1.05);
        }

        h2 {
            margin-top: 40px;
        }

        button:hover {
            transform: scale(1.05);

            transition: 0.4s;

            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.781);
            cursor: pointer;
        }

        button {
            display: block;
            transition: 0.4s;
            will-change: transform;
            color: rgb(255, 255, 255);
            width: 300px;

            padding: 30px;

            border: 2px solid rgb(246, 255, 0);

            border-radius: 20px;

            background: rgba(0, 0, 0, 0.607);

            backdrop-filter: blur(10px);

            text-align: center;

            box-shadow: 0px 0px 10px rgb(0, 0, 0);
            margin-bottom: 50px !important;
        }

        @keyframes aparecer {

            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes subir {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body::before {
            content: "";

            position: fixed;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            background: rgba(0, 0, 0, 0.3);

            z-index: -1;

            pointer-events: none;
        }

        video {


            position: fixed;

            width: 100%;

            height: 100%;

            object-fit: cover;

            top: 0;

            left: 0;

            z-index: -2;
        }

        h2:hover {
            transform: scale(1.05);

            transition: 0.4s;

            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.781);
            cursor: pointer;
        }

        h1 {
            text-shadow:
                0 0 10px cyan,
                0 0 20px cyan,
                0 0 40px cyan;

            color: rgb(255, 255, 255);
            background-color: rgba(0, 0, 0, 0.389);
            border-radius: 20px;
            padding: 15px 20px;
            margin: 3px auto;
            width: fit-content;
            border: 2px solid rgb(0, 255, 238);
            backdrop-filter: blur(10px);
            font-family: Arial;
            margin-top: 20px;
        }



        @keyframes aparecer {

            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>



<body>
    <h1>Mis proyectos:</h1>


    <a href="https://paginadeprueba12.netlify.app/" target="_blank">

        <div class="proyecto card">

            <h2>🌐 Página 1</h2>

            <p>Mi primera página web hecha con HTML y CSS.</p>

        </div>

    </a>
    <a href="https://paginadev1.netlify.app" target="_blank">

        <div class="proyecto card">

            <h2>🎮 Página 2</h2>

            <p>Mi segundo proyecto.</p>

        </div>

    </a>

    </div>
    <script>

        const tarjetas = document.querySelectorAll(".card");

        tarjetas.forEach(card => {

            card.addEventListener("mousemove", (e) => {

                const rect = card.getBoundingClientRect();

                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const rotateY = (x / rect.width - 0.5) * 20;
                const rotateX = (0.5 - y / rect.height) * 20;

                card.style.transform =
                    `perspective(1000px)
             rotateY(${rotateY}deg)
             rotateX(${rotateX}deg)
             translateY(-8px)`;

            });

            card.addEventListener("mouseleave", () => {

                card.style.transform =
                    "perspective(1000px) rotateY(0deg) rotateX(0deg)";

            });

        });

    </script>

    <audio id="sonido" src="Click.mp3"></audio>

    <audio id="sonido" preload="auto">
        <source src="Click.mp3" type="audio/mpeg">
    </audio>


    <script>


        function sonar() {
            let audio = document.getElementById("sonido").cloneNode(true);
            audio.play();

        }

    </script>



    <video autoplay muted loop>
        <source src="fondo2.0.mp4">
    </video>

</body>

</html>
